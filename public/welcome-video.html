<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Venuely — Get Set Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --coral:#FA523C; --coral-deep:#E5412B; --coral-soft:#FF7E5F;
    --ink:#2A2622; --paper:#FFF6F0; --muted:#8A817A; --muted2:#B8AFA8;
    --green:#1F9D57; --card:#FFFFFF; --hair:#EFE7E0; --field:#F6F0EA;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    background:#211d1a; font-family:'Mulish',sans-serif; overflow:hidden;
    display:flex; align-items:center; justify-content:center; min-height:100vh;
  }
  #viewport{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  #stage{
    position:relative; width:1920px; height:1080px; transform-origin:center center;
    background:radial-gradient(1300px 760px at 50% -10%, #FFFCF8 0%, var(--paper) 60%);
    border-radius:36px; overflow:hidden; box-shadow:0 40px 130px rgba(0,0,0,.5);
  }
  #stage::after{
    content:""; position:absolute; right:-240px; top:-260px; width:680px; height:680px; border-radius:50%;
    background:radial-gradient(circle at 32% 32%, rgba(250,82,60,.10), rgba(250,82,60,0) 62%); pointer-events:none;
  }

  /* top bar */
  #topbar{ position:absolute; top:56px; left:96px; right:96px; display:flex; align-items:center; justify-content:space-between; }
  .brand{ display:flex; align-items:center; gap:16px; }
  .brand .vmark{ width:52px; height:52px; border-radius:14px; }
  .brand .bt{ font-family:'Playfair Display',serif; font-weight:700; font-size:30px; color:var(--ink); }
  .brand .bt small{ font-family:'Mulish'; font-weight:600; font-size:18px; color:var(--muted); letter-spacing:.02em; display:block; margin-top:-2px; }
  #pips{ display:flex; gap:12px; }
  .pip{ width:64px; height:8px; border-radius:8px; background:rgba(42,38,34,.12); overflow:hidden; }
  .pip i{ display:block; height:100%; width:0; background:linear-gradient(90deg,var(--coral-soft),var(--coral)); border-radius:8px; }

  /* device card */
  #screen{
    position:absolute; left:370px; top:150px; width:1180px; height:660px;
    background:var(--card); border-radius:26px; overflow:hidden;
    box-shadow:0 30px 70px rgba(58,40,34,.18), 0 2px 0 rgba(255,255,255,.6) inset;
    border:1px solid var(--hair);
  }
  #chrome{ height:54px; background:#FBF6F2; border-bottom:1px solid var(--hair); display:flex; align-items:center; padding:0 20px; gap:16px; }
  .dots{ display:flex; gap:8px; }
  .dots span{ width:12px; height:12px; border-radius:50%; background:#E7DDD5; }
  .urlbar{ flex:1; height:30px; background:#fff; border:1px solid var(--hair); border-radius:8px; display:flex; align-items:center; padding:0 12px; gap:8px; color:var(--muted); font-size:15px; font-weight:600; }
  .urlbar svg{ width:13px; height:13px; }
  #canvas{ position:absolute; left:0; top:54px; width:1180px; height:606px; }

  .scene{ position:absolute; inset:0; opacity:0; }
  .scene-inner{ position:absolute; inset:0; padding:34px 40px; }

  /* generic mock bits */
  .panel{ position:absolute; background:#fff; border:1px solid var(--hair); border-radius:18px; box-shadow:0 12px 30px rgba(58,40,34,.07); }
  .ph{ font-family:'Mulish'; font-weight:800; color:var(--ink); }
  .lbl{ font-size:15px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted2); }
  .field{ height:54px; background:var(--field); border:1px solid var(--hair); border-radius:12px; display:flex; align-items:center; padding:0 16px; font-size:21px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; }
  .nw{ white-space:nowrap; }
  .caret{ display:inline-block; width:2px; height:24px; background:var(--coral); margin-left:1px; vertical-align:-4px; }
  .chip{ display:inline-flex; align-items:center; gap:8px; height:38px; padding:0 14px; border-radius:999px; font-weight:700; font-size:17px; }
  .chip.ok{ background:rgba(31,157,87,.12); color:var(--green); }
  .chip.com{ background:rgba(250,82,60,.12); color:var(--coral-deep); }
  .tick{ width:26px; height:26px; border-radius:50%; background:var(--green); display:inline-flex; align-items:center; justify-content:center; }
  .tick svg{ width:15px; height:15px; stroke:#fff; stroke-width:3; fill:none; }
  .btn{ height:56px; border-radius:14px; background:var(--coral); color:#fff; font-weight:800; font-size:21px; display:inline-flex; align-items:center; justify-content:center; gap:10px; box-shadow:0 10px 24px rgba(250,82,60,.32); }

  .grad{ background:linear-gradient(135deg,#FFE2D6,#FFC9B6 55%,#FFB59E); position:relative; overflow:hidden; }
  .grad.alt{ background:linear-gradient(135deg,#E7E0FF,#CFC6F4 60%,#Bcafee); }
  .grad.alt2{ background:linear-gradient(135deg,#D8EFE0,#Bfe6cf 60%,#a9dcbd); }
  .grad .ic{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:.5; }
  .grad .ic svg{ width:54px; height:54px; stroke:#fff; fill:none; stroke-width:1.6; }

  /* caption */
  #caption{ position:absolute; left:0; right:0; top:858px; text-align:center; }
  #cap-eb{ font-weight:800; font-size:21px; letter-spacing:.26em; text-transform:uppercase; color:var(--coral); }
  #cap-title{ font-family:'Playfair Display',serif; font-weight:800; font-size:62px; color:var(--ink); margin:10px 0 0; line-height:1; }
  #cap-desc{ font-size:27px; color:var(--muted); margin-top:14px; font-weight:500; max-width:1180px; margin-left:auto; margin-right:auto; }

  #replay{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:20; border:none; cursor:pointer;
    background:rgba(255,255,255,.92); color:#211d1a; font-family:'Mulish'; font-weight:700; font-size:14px;
    padding:10px 20px; border-radius:999px; box-shadow:0 8px 24px rgba(0,0,0,.35); display:inline-flex; align-items:center; gap:7px;
  }
  #replay svg{ width:14px; height:14px; }
  #replay{ display:none !important; }
</style>
</head>
<body>
<div id="viewport">
  <div id="stage">
    <div id="topbar">
      <div class="brand">
        <svg class="vmark" viewBox="0 0 240 240"><rect width="240" height="240" rx="56" fill="#FA523C"/><text x="124" y="168" text-anchor="middle" font-family="'Playfair Display',serif" font-weight="700" font-size="120" fill="#FFFDFB">V</text><circle cx="160" cy="159" r="10" fill="#FFFDFB"/></svg>
        <div class="bt">Venuely<small>Let's get you set up</small></div>
      </div>
      <div id="pips">
        <div class="pip"><i></i></div><div class="pip"><i></i></div><div class="pip"><i></i></div><div class="pip"><i></i></div>
      </div>
    </div>

    <div id="screen">
      <div id="chrome">
        <div class="dots"><span></span><span></span><span></span></div>
        <div class="urlbar"><svg viewBox="0 0 24 24" fill="none" stroke="#B8AFA8" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>app.venuely.co.za / setup</div>
      </div>
      <div id="canvas"></div>
    </div>

    <div id="caption">
      <div id="cap-eb">Welcome to Venuely</div>
      <h1 id="cap-title">Let's get you set up</h1>
      <div id="cap-desc">Four quick steps to your first wedding portal.</div>
    </div>
  </div>
</div>

<button id="replay" aria-label="Replay">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v4h4"/></svg> Replay
</button>

<script src="/welcome-scenes.js"></script>
</body>
</html>
